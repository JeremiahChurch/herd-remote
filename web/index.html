<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>herd-remote</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#2a3140;
    --fg:#e6edf3; --muted:#8b949e;
    /* status palette mirrors herdr: green idle, orange working, red blocked */
    --idle:#3fb950; --working:#f0883e; --blocked:#f85149; --done:#6e7681; --unknown:#d29922;
    --accent:#58a6ff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;overflow:hidden}
  header{flex:none;background:var(--panel);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    display:flex;align-items:center;gap:10px}
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .sp{flex:1}
  button{font:inherit;color:var(--fg);background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;cursor:pointer}
  button:active{transform:translateY(1px)}
  .btn-accent{background:var(--accent);color:#04121f;border-color:transparent;font-weight:600}
  .btn-codex{background:#8957e5;color:#fff;border-color:transparent;font-weight:600}
  .seg{display:flex;gap:6px;padding:8px 12px 0}
  .seg button{flex:1;padding:7px 0;font-size:13px}
  .seg button.on{background:var(--accent);color:#04121f;border-color:transparent;font-weight:600}
  .seg button.on.codex{background:#8957e5;color:#fff}
  /* each top-level view is a full-height flex column */
  .view{position:absolute;inset:0;display:flex;flex-direction:column}
  .view.hidden{display:none}
  .scrollwrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}
  .wrap{max-width:760px;margin:0 auto;width:100%;padding:12px 12px calc(env(safe-area-inset-bottom) + 24px)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .card:active{background:var(--panel2)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.03)}
  .idle{background:var(--idle)} .working{background:var(--working)}
  .blocked{background:var(--blocked);animation:pulse 1s infinite}
  .done{background:var(--done)} .unknown{background:var(--unknown)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .meta{flex:1;min-width:0}
  .meta .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .s{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .badge{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  /* status-tinted badges (list + detail) so state reads at a glance, herdr-style */
  .badge.st-idle{color:var(--idle);border-color:var(--idle)}
  .badge.st-working{color:var(--working);border-color:var(--working)}
  .badge.st-blocked{color:var(--blocked);border-color:var(--blocked)}
  .badge.st-done{color:var(--done);border-color:var(--done)}
  .badge.st-unknown{color:var(--unknown);border-color:var(--unknown)}
  .agentTag{font-size:10px;color:var(--muted)}
  /* resume: age pinned to a fixed left column so it never gets pushed off by a long path */
  .card .age{flex:none;width:46px;font-size:11px;color:var(--muted);
    font-variant-numeric:tabular-nums;text-align:left}
  .pid{font:11px/1 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--muted);font-weight:400}

  /* detail: scrollback fills, controls pinned to the bottom */
  #dScroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;
    background:#010409;margin:10px 10px 0;border:1px solid var(--line);border-radius:12px}
  #scroll{padding:12px;margin:0;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;
    white-space:pre-wrap;word-break:break-word;min-height:100%}
  /* Copy on a phone: keep "Select All" scoped to the terminal scrollback only, so
     it grabs the screen text - not the header, status badges, or control buttons. */
  header,.metabar,.controls,.card .badge,.agentTag,.pid{-webkit-user-select:none;user-select:none}
  #scroll{-webkit-user-select:text;user-select:text;cursor:text}
  /* copy mode: a plain readonly textarea with native, well-behaved mobile selection.
     Polling is paused while it's showing, so nothing shifts under your finger. */
  #scrollText{width:100%;height:100%;box-sizing:border-box;border:0;resize:none;outline:none;
    padding:12px;margin:0;background:#010409;color:var(--fg);
    font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;
    white-space:pre-wrap;word-break:break-word;-webkit-user-select:text;user-select:text}
  .controls textarea{-webkit-user-select:text;user-select:text}
  #copyBtn{padding:5px 9px;font-size:12px;border-radius:8px}
  #copyBtn.on{background:var(--accent);color:#04121f;border-color:transparent;font-weight:600}
  .controls{flex:none;padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);
    background:var(--panel);border-top:1px solid var(--line)}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
  .promptbar{display:flex;gap:8px;margin:8px 0 0}
  .promptbar textarea{flex:1;background:var(--panel2);border:1px solid var(--line);
    color:var(--fg);border-radius:10px;padding:10px;font:inherit;resize:none}
  .metabar{display:flex;gap:8px;align-items:center;padding:6px 10px 0}
  .list-input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--fg);
    border-radius:10px;padding:12px;margin-bottom:10px}
  label.fld{display:block;color:var(--muted);font-size:12px;margin:12px 0 4px}
  .danger{color:var(--blocked);border-color:var(--blocked)}
  .empty{color:var(--muted);text-align:center;padding:40px 0}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 90px);transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 16px;
    z-index:20;opacity:0;transition:opacity .2s;max-width:90%;pointer-events:none}
  .toast.show{opacity:1}
  .center{max-width:360px;margin:16vh auto 0;padding:0 20px;text-align:center}
  .center input{width:100%;text-align:center;font-size:18px;margin:16px 0}
  .spawnRow{display:flex;gap:8px}
  .spawnRow button{flex:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="view hidden"><div class="scrollwrap"><div class="center">
  <h1>herd-remote</h1>
  <p style="color:var(--muted)">Enter access password</p>
  <input id="pw" type="password" inputmode="text" autocomplete="current-password" placeholder="password">
  <button class="btn-accent" style="width:100%" onclick="doLogin()">Unlock</button>
  <p id="loginErr" style="color:var(--blocked)"></p>
</div></div></div>

<!-- LIST -->
<div id="listView" class="view hidden">
  <header>
    <h1>Sessions</h1><span class="sp"></span>
    <button onclick="showResume()">↩ Resume</button>
    <button onclick="showSpawn()">＋ Spawn</button>
    <button onclick="refresh()">↻</button>
  </header>
  <div class="scrollwrap"><div class="wrap" id="cards"></div></div>
</div>

<!-- DETAIL -->
<div id="detailView" class="view hidden">
  <header>
    <button onclick="backToList()">‹</button>
    <h1 id="dTitle">session</h1><span class="sp"></span>
    <button onclick="renameCur()">✎</button>
  </header>
  <div class="metabar">
    <span class="badge" id="dAgent"></span>
    <span class="pid" id="dPane"></span>
    <span class="badge" id="dStatus"></span>
    <span class="sp"></span>
    <button id="copyBtn" onclick="toggleCopy()">⧉ Copy</button>
    <label style="color:var(--muted);font-size:12px"><input type="checkbox" id="auto" checked> auto</label>
  </div>
  <div id="dScroll"><pre id="scroll">loading…</pre><textarea id="scrollText" class="hidden" readonly></textarea></div>

  <div class="controls">
    <div class="grid4">
      <button class="btn-accent" onclick="key('Enter')">✔ Enter</button>
      <button onclick="key('Escape')">✕ Esc</button>
      <button onclick="key('C-c')">⎉ C-c</button>
      <button onclick="clearSession()">/clear</button>
    </div>
    <div class="grid4">
      <button onclick="key('Left')">◀</button>
      <button onclick="key('Up')">▲</button>
      <button onclick="key('Down')">▼</button>
      <button onclick="key('Right')">▶</button>
    </div>
    <div class="grid4">
      <button onclick="key('y')">y</button>
      <button onclick="key('n')">n</button>
      <button onclick="key('1')">1</button>
      <button onclick="key('2')">2</button>
    </div>
    <div class="grid4">
      <button onclick="key('3')">3</button>
      <button onclick="key('4')">4</button>
      <button onclick="key('5')">5</button>
      <button onclick="closeSession()" class="danger">✕ kill</button>
    </div>
    <select id="cmdSel" class="list-input" style="margin:0 0 8px" onchange="runCmd(this)">
      <option value="">⌘ command / key…</option>
      <optgroup label="slash">
        <option data-kind="cmd" value="/compact">/compact</option>
        <option data-kind="cmd" value="/context">/context</option>
        <option data-kind="cmd" value="/usage">/usage</option>
      </optgroup>
      <optgroup label="keys">
        <option data-kind="key" value="Shift+Tab">⇧Tab · cycle perm mode</option>
        <option data-kind="key" value="Space">Space</option>
        <option data-kind="key" value="Tab">Tab</option>
        <option data-kind="key" value="Backspace">Backspace</option>
      </optgroup>
    </select>
    <div class="promptbar">
      <textarea id="prompt" rows="2" placeholder="type a prompt…"></textarea>
      <button class="btn-accent" onclick="sendPrompt()">Send</button>
    </div>
  </div>
</div>

<!-- SPAWN -->
<div id="spawnView" class="view hidden">
  <header>
    <button onclick="backToList()">‹</button>
    <h1>Spawn</h1>
  </header>
  <div class="scrollwrap"><div class="wrap">
    <label class="fld">Session name (optional; labels the herdr window + this list)</label>
    <input id="spawnName" class="list-input" placeholder="e.g. failing-simplemdm-test"
      autocapitalize="off" autocomplete="off" spellcheck="false">
    <label class="fld">Folder — pick below, or type any path (even hidden, e.g. ~/.ssh)</label>
    <input id="folderFilter" class="list-input" placeholder="type a path or filter…"
      oninput="renderFolders()" autocapitalize="off" autocomplete="off" spellcheck="false">
    <select id="folder" class="list-input" size="8" style="height:auto"
      onchange="$('folderFilter').value=this.options[this.selectedIndex].textContent"></select>
    <label class="fld">First prompt (optional)</label>
    <textarea id="spawnPrompt" class="list-input" rows="3" placeholder="what should it do?"></textarea>
    <label class="fld">Model (picks the agent too — Claude on top, Codex below)</label>
    <select id="spawnModel" class="list-input" onchange="updateLaunchBtn()">
      <optgroup label="Claude">
        <option data-agent="claude" data-model="opus"   data-effort="">Opus 4.8</option>
        <option data-agent="claude" data-model="sonnet" data-effort="">Sonnet 5</option>
        <option data-agent="claude" data-model="fable"  data-effort="">Fable 5</option>
      </optgroup>
      <optgroup label="Codex">
        <option data-agent="codex" data-model="gpt-5.6-sol"   data-effort="high">Codex · Sol · high</option>
        <option data-agent="codex" data-model="gpt-5.6-sol"   data-effort="medium">Codex · Sol · medium</option>
        <option data-agent="codex" data-model="gpt-5.6-terra" data-effort="high">Codex · Terra · high</option>
        <option data-agent="codex" data-model="gpt-5.6-terra" data-effort="medium">Codex · Terra · medium</option>
      </optgroup>
    </select>
    <button class="btn-accent" id="launchBtn" style="width:100%" onclick="doSpawn()">Launch</button>
    <p id="spawnMsg" style="color:var(--muted)"></p>
  </div></div>
</div>

<!-- RESUME -->
<div id="resumeView" class="view hidden">
  <header>
    <button onclick="backToList()">‹</button>
    <h1>Resume</h1><span class="sp"></span>
    <button onclick="renderResume()">↻</button>
  </header>
  <div class="seg">
    <button id="haAll" class="on" onclick="setHistAgent('all')">All</button>
    <button id="haClaude" onclick="setHistAgent('claude')">Claude</button>
    <button id="haCodex" onclick="setHistAgent('codex')">Codex</button>
  </div>
  <div style="padding:10px 12px 0"><input id="histFilter" class="list-input" style="margin:0"
    placeholder="filter by folder or name…" oninput="filterHistory()"
    autocapitalize="off" autocomplete="off" spellcheck="false"></div>
  <div class="scrollwrap"><div class="wrap" id="histCards"></div></div>
</div>

<div id="toast" class="toast"></div>

<script>
let cur=null, folders=[], pollTimer=null, refreshLoop=null, reading=false, copyMode=false, lastText='';
const STATUSES=['idle','working','blocked','done','unknown'];
const $=id=>document.getElementById(id);
function show(view){for(const v of ['login','listView','detailView','spawnView','resumeView'])$(v).classList.add('hidden');$(view).classList.remove('hidden');}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function escHtml(s){return(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

async function api(path,opts){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));
  if(r.status===401){stopPoll();cur=null;show('login');throw new Error('unauth');}
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||('http '+r.status));
  return j;
}

// ---------- ANSI -> HTML (basic SGR: 16 colors + 256 + truecolor, bold/underline/inverse) ----------
const ANSI_FG={30:'#484f58',31:'#ff7b72',32:'#3fb950',33:'#d29922',34:'#58a6ff',35:'#bc8cff',36:'#39c5cf',37:'#b1bac4',
  90:'#6e7681',91:'#ffa198',92:'#56d364',93:'#e3b341',94:'#79c0ff',95:'#d2a8ff',96:'#56d4dd',97:'#f0f6fc'};
const ANSI_BG={40:'#010409',41:'#ff7b72',42:'#3fb950',43:'#d29922',44:'#58a6ff',45:'#bc8cff',46:'#39c5cf',47:'#b1bac4',
  100:'#6e7681',101:'#ffa198',102:'#56d364',103:'#e3b341',104:'#79c0ff',105:'#d2a8ff',106:'#56d4dd',107:'#f0f6fc'};
function xterm256(n){
  if(n<8)return ANSI_FG[30+n]; if(n<16)return ANSI_FG[90+(n-8)];
  if(n>=232){const v=8+(n-232)*10;return `rgb(${v},${v},${v})`;}
  n-=16;const r=Math.floor(n/36),g=Math.floor((n%36)/6),b=n%6;const c=v=>v?55+v*40:0;
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}
function ansiToHtml(s){
  s=s.replace(/\r\n/g,'\n').replace(/\r/g,'');
  let out='',cur='',i=0,fg=null,bg=null,bold=false,ul=false,inv=false;
  const open=()=>{let f=fg,b=bg;if(inv){const t=f;f=b||'#0d1117';b=t||'#e6edf3';}
    let st='';if(f)st+='color:'+f+';';if(b)st+='background:'+b+';';if(bold)st+='font-weight:600;';if(ul)st+='text-decoration:underline;';
    return st?'<span style="'+st+'">':'<span>';};
  const flush=()=>{if(cur){out+=open()+escHtml(cur)+'</span>';cur='';}};
  const sgr=p=>{const codes=(p===''?'0':p).split(';').map(Number);
    for(let k=0;k<codes.length;k++){const n=codes[k];
      if(n===0){fg=bg=null;bold=ul=inv=false;}
      else if(n===1)bold=true;else if(n===22)bold=false;
      else if(n===4)ul=true;else if(n===24)ul=false;
      else if(n===7)inv=true;else if(n===27)inv=false;
      else if(n===39)fg=null;else if(n===49)bg=null;
      else if(ANSI_FG[n])fg=ANSI_FG[n];else if(ANSI_BG[n])bg=ANSI_BG[n];
      else if(n===38&&codes[k+1]===5){fg=xterm256(codes[k+2]);k+=2;}
      else if(n===48&&codes[k+1]===5){bg=xterm256(codes[k+2]);k+=2;}
      else if(n===38&&codes[k+1]===2){fg=`rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`;k+=4;}
      else if(n===48&&codes[k+1]===2){bg=`rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`;k+=4;}
    }};
  while(i<s.length){const c=s[i];
    if(c==='\x1b'&&s[i+1]==='['){let j=i+2;while(j<s.length&&!/[A-Za-z]/.test(s[j]))j++;
      if(s[j]==='m'){flush();sgr(s.slice(i+2,j));}i=j+1;continue;}
    if(c==='\x1b'){i+=2;continue;}
    cur+=c;i++;}
  flush();return out;
}

// ---------- login ----------
async function doLogin(){
  $('loginErr').textContent='';
  try{await api('/api/login',{method:'POST',body:JSON.stringify({password:$('pw').value})});$('pw').value='';boot();}
  catch(e){$('loginErr').textContent=e.message;}
}
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ---------- list ----------
async function refresh(){try{const j=await api('/api/sessions');renderCards(j.sessions||[]);}catch(e){if(e.message!=='unauth'&&!/failed to fetch/i.test(e.message))toast(e.message);}}
function renderCards(sessions){
  const c=$('cards');c.innerHTML='';
  if(!sessions.length){c.innerHTML='<div class="empty">no sessions</div>';return;}
  for(const s of sessions){
    const d=document.createElement('div');d.className='card';d.onclick=()=>openDetail(s);
    const st=STATUSES.includes(s.status)?s.status:'unknown';
    const pid=s.pane_id?`<span class="pid">${escHtml(s.pane_id)}</span>`:'';
    d.innerHTML=`<span class="dot ${st}"></span>
      <div class="meta"><div class="t">${escHtml(s.label||s.name||'—')} ${pid}</div>
      <div class="s">${escHtml(shortCwd(s.cwd))}</div></div>
      <div style="text-align:right"><div class="agentTag">${escHtml(s.agent||'')}</div>
      <div class="badge st-${st}">${escHtml(s.status||'?')}</div></div>`;
    c.appendChild(d);
  }
}
function shortCwd(p){return p?p.replace(/^\/home\/[^/]+/,'~'):'';}

// ---------- navigation (History API so the browser/phone Back button works) ----------
function navTo(st){history.pushState(st,'');applyState(st);}
function backToList(){history.back();}
function applyState(st){
  st=st||{view:'list'};
  if(st.view==='detail'&&st.s){renderDetail(st.s);return;}
  if(st.view==='spawn'){renderSpawn();return;}
  if(st.view==='resume'){renderResume();return;}
  stopPoll();show('listView');refresh();
}
window.addEventListener('popstate',e=>applyState(e.state));

// ---------- detail ----------
function openDetail(s){navTo({view:'detail',s});}
function renderDetail(s){cur=s;show('detailView');
  $('dTitle').textContent=s.label||s.name||'session';
  $('dAgent').textContent=s.agent||'';$('dPane').textContent=s.pane_id||'';
  const dst=STATUSES.includes(s.status)?s.status:'unknown';
  $('dStatus').textContent=s.status||'';$('dStatus').className='badge st-'+dst;
  if(copyMode)toggleCopy(); // reset to the live colored view on entry
  $('scroll').textContent='loading…';readScroll();startPoll();}
function startPoll(){stopPoll();pollTimer=setInterval(()=>{if($('auto').checked&&!copyMode)readScroll();},2500);}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}
function ansiStrip(s){return(s||'')
  .replace(/\x1B\[[0-9;?]*[ -\/]*[@-~]/g,'')  // CSI (color/cursor) sequences
  .replace(/\x1B[@-Z\\-_]/g,'')               // other escapes (OSC intros etc.)
  .replace(/\r\n/g,'\n').replace(/\r/g,'');}
// The agent input box draws full-width horizontal rules (─── / ━━━ / ═══, 100+ chars).
// On a phone those wrap into many visual lines, so the prompt scrolls off-screen. Collapse
// each long rule run to a short divider so the box stays ~2 lines. Display-only; the run
// stays inside its original ANSI color span, so the divider keeps its color.
function collapseRules(s){return(s||'')
  .replace(/[─━┄┅┈┉╌╍═—―]{12,}/g,'─'.repeat(24))
  .replace(/[-_=]{24,}/g,m=>m[0].repeat(24));}
// Copy mode: freeze the scrollback into a readonly textarea (native mobile selection),
// pause polling so nothing moves under your finger. Toggle back to the live colored view.
function toggleCopy(){
  copyMode=!copyMode;
  const pre=$('scroll'),ta=$('scrollText'),btn=$('copyBtn');
  if(copyMode){
    ta.value=ansiStrip(lastText);pre.classList.add('hidden');ta.classList.remove('hidden');
    btn.textContent='✓ Done';btn.classList.add('on');
  }else{
    ta.classList.add('hidden');pre.classList.remove('hidden');
    btn.textContent='⧉ Copy';btn.classList.remove('on');readScroll();
  }
}
async function readScroll(){
  if(!cur||reading||copyMode)return;
  const pane=cur.pane_id;reading=true;
  try{
    const j=await api(`/api/sessions/${encodeURIComponent(pane)}/read?lines=200`);
    if(!cur||cur.pane_id!==pane)return; // navigated away mid-request
    lastText=j.text||'';
    const box=$('dScroll'),atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<40;
    $('scroll').innerHTML=ansiToHtml(collapseRules(lastText));
    if(atBottom)box.scrollTop=box.scrollHeight;
  }catch(e){}finally{reading=false;}
}
async function key(k){if(!cur)return;
  try{await api(`/api/sessions/${encodeURIComponent(cur.pane_id)}/key`,{method:'POST',body:JSON.stringify({key:k})});toast(k);setTimeout(readScroll,300);}
  catch(e){toast(e.message);}}
async function sendPrompt(){if(!cur)return;const t=$('prompt').value;if(!t.trim())return;
  try{await api(`/api/sessions/${encodeURIComponent(cur.pane_id)}/prompt`,{method:'POST',body:JSON.stringify({text:t})});$('prompt').value='';toast('sent');setTimeout(readScroll,400);}
  catch(e){toast(e.message);}}
async function clearSession(){if(!cur)return;
  try{await api(`/api/sessions/${encodeURIComponent(cur.pane_id)}/prompt`,{method:'POST',body:JSON.stringify({text:'/clear'})});toast('/clear');setTimeout(readScroll,400);}
  catch(e){toast(e.message);}}
// runCmd dispatches the command/key select: 'key' items reuse the allowlisted send-keys
// path; 'cmd' items are typed as a slash-command prompt (text + Enter). Snaps back to the
// header label after each run so the picker is a fire-and-reset control, not a mode.
async function runCmd(sel){
  const o=sel.options[sel.selectedIndex],kind=o.dataset.kind,val=o.value;
  sel.selectedIndex=0;
  if(!val||!cur)return;
  if(kind==='key')return key(val);
  try{await api(`/api/sessions/${encodeURIComponent(cur.pane_id)}/prompt`,{method:'POST',body:JSON.stringify({text:val})});
    toast(val);setTimeout(readScroll,400);}
  catch(e){toast(e.message);}}
async function renameCur(){if(!cur)return;const name=window.prompt('Rename session',cur.label||'');if(!name)return;
  try{await api(`/api/sessions/${encodeURIComponent(cur.workspace_id)}/rename`,{method:'POST',body:JSON.stringify({label:name,pane:cur.pane_id})});
    cur.label=name;$('dTitle').textContent=name;toast('renamed');}catch(e){toast(e.message);}}
async function closeSession(){if(!cur)return;if(!confirm('Kill this session?'))return;
  try{await api(`/api/sessions/${encodeURIComponent(cur.workspace_id)}/close`,{method:'POST'});toast('closed');backToList();}
  catch(e){toast(e.message);}}

// ---------- spawn ----------
function showSpawn(){navTo({view:'spawn'});}
async function renderSpawn(){stopPoll();show('spawnView');$('spawnMsg').textContent='';updateLaunchBtn();
  try{const j=await api('/api/folders');folders=j.folders||[];renderFolders();}catch(e){toast(e.message);}}
function renderFolders(){
  const f=$('folderFilter').value.toLowerCase(),sel=$('folder');sel.innerHTML='';
  for(const d of folders){if(f&&!d.short.toLowerCase().includes(f))continue;
    const o=document.createElement('option');o.value=d.path;o.textContent=d.short;sel.appendChild(o);}
  if(sel.options.length)sel.selectedIndex=0;
}
// selModel returns the currently selected model <option> (carries agent+model+effort).
function selModel(){const s=$('spawnModel');return s.options[s.selectedIndex];}
// updateLaunchBtn reflects the picked model on the single Launch button: its label
// and its tint (accent for Claude, purple for Codex) so the agent still reads at a glance.
function updateLaunchBtn(){const o=selModel();if(!o)return;const b=$('launchBtn');
  b.textContent='Launch '+o.textContent;
  b.className=(o.dataset.agent==='codex'?'btn-codex':'btn-accent');}
async function doSpawn(){
  // If the input looks like a path (starts with / ~ or ./), use it verbatim - even a
  // hidden dir like ~/.ssh. Otherwise treat the text as a filter word and use the
  // highlighted list option. Invalid paths just come back as a herd-spawn error.
  let dir=$('folderFilter').value.trim();
  const looksPath=/^([\/~]|\.\.?\/)/.test(dir);
  if(dir&&!looksPath&&$('folder').value)dir=$('folder').value;
  if(!dir)dir=$('folder').value;
  if(!dir){toast('pick or type a folder');return;}
  const o=selModel();
  const agent=o.dataset.agent, model=o.dataset.model||'', effort=o.dataset.effort||'';
  const name=$('spawnName').value.trim();
  $('spawnMsg').textContent=`spawning ${agent}…`;
  try{const j=await api('/api/spawn',{method:'POST',body:JSON.stringify({
    dir,agent,name,prompt:$('spawnPrompt').value,model,effort,background:true})});
    $('spawnMsg').textContent=j.result||'spawned';
    // start fresh: clear name, path filter, prompt (keep the model choice for repeats)
    $('spawnName').value='';$('folderFilter').value='';$('spawnPrompt').value='';
    renderFolders();
    if(j.pane_id){ // jump straight into the new session instead of back to the list
      const label=name||(dir.replace(/\/+$/,'').split('/').pop()||dir);
      const s={workspace_id:j.workspace_id,pane_id:j.pane_id,agent,
        label,name:'',status:'working',cwd:dir};
      history.replaceState({view:'detail',s},'');renderDetail(s);
    }else{setTimeout(backToList,800);}
  }catch(e){$('spawnMsg').textContent=e.message;}
}

// ---------- resume (past sessions from disk) ----------
let histList=[],histAgent='all';
function showResume(){navTo({view:'resume'});}
function setHistAgent(a){histAgent=a;
  for(const [id,val] of [['haAll','all'],['haClaude','claude'],['haCodex','codex']]){
    const b=$(id);b.classList.toggle('on',val===a);b.classList.toggle('codex',val==='codex'&&val===a);}
  filterHistory();}
async function renderResume(){stopPoll();show('resumeView');
  $('histCards').innerHTML='<div class="empty">loading…</div>';
  try{const j=await api('/api/history?limit=200');histList=j.history||[];filterHistory();}
  catch(e){$('histCards').innerHTML='<div class="empty">'+escHtml(e.message)+'</div>';}}
function ago(sec){if(!sec)return'';let s=Math.floor(Date.now()/1000)-sec;if(s<0)s=0;
  if(s<60)return'just now';const m=Math.floor(s/60);if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';const d=Math.floor(h/24);
  if(d<30)return d+'d ago';return Math.floor(d/30)+'mo ago';}
// agoShort is the compact form for the pinned left age column (now / 5m / 3h / 2d / 4mo).
function agoShort(sec){if(!sec)return'';let s=Math.floor(Date.now()/1000)-sec;if(s<0)s=0;
  if(s<60)return'now';const m=Math.floor(s/60);if(m<60)return m+'m';
  const h=Math.floor(m/60);if(h<24)return h+'h';const d=Math.floor(h/24);
  if(d<30)return d+'d';return Math.floor(d/30)+'mo';}
function filterHistory(){
  const q=($('histFilter').value||'').toLowerCase(),c=$('histCards');c.innerHTML='';
  // Search the name AND the full folder path (substring, so "exam" hits "name-example"),
  // matching the folder-picker's path search. shortCwd is folded in so "~/foo" queries hit too.
  const items=histList.filter(e=>(histAgent==='all'||e.agent===histAgent)&&
    (!q||((e.name||'')+' '+(e.cwd||'')+' '+shortCwd(e.cwd)+' '+e.agent).toLowerCase().includes(q)));
  if(!items.length){c.innerHTML='<div class="empty">no matching sessions</div>';return;}
  for(const e of items){
    const d=document.createElement('div');d.className='card';d.onclick=()=>resumeSession(e);
    const tag=`<span class="agentTag"${e.agent==='codex'?' style="color:#bc8cff"':''}>${escHtml(e.agent)}</span>`;
    const where=shortCwd(e.cwd);
    d.innerHTML=`<div class="age">${escHtml(agoShort(e.modified))}</div>
      <div class="meta"><div class="t">${escHtml(e.name||'(untitled)')}</div>
      <div class="s">${escHtml(where||'~')}</div></div>
      <div style="text-align:right">${tag}</div>`;
    c.appendChild(d);
  }
}
async function resumeSession(e){
  if(!confirm(`Resume ${e.agent}: ${e.name||e.id}?`))return;
  const dir=e.cwd||'~'; // codex index has no cwd; '~' lets herd-spawn resolve HOME
  try{const j=await api('/api/spawn',{method:'POST',body:JSON.stringify({
    dir,agent:e.agent,name:e.name||'',resume:e.id,background:true})});
    toast('resuming…');
    if(j.pane_id){ // jump into the resumed session
      const s={workspace_id:j.workspace_id,pane_id:j.pane_id,agent:e.agent,
        label:e.name||e.id,name:'',status:'working',cwd:dir};
      history.replaceState({view:'detail',s},'');renderDetail(s);
    }else{setTimeout(backToList,800);}
  }catch(err){toast(err.message);}}

// ---------- wake refresh: re-fetch the current view whenever the page returns to the foreground ----------
// Mobile browsers freeze timers on a backgrounded tab, so on resume the screen is stale and the
// first queued fetch can fail. Re-pull the active view's data the moment the page is visible again.
function refreshCurrentView(){
  if(!$('listView').classList.contains('hidden'))refresh();
  else if(!$('detailView').classList.contains('hidden'))readScroll();
  else if(!$('resumeView').classList.contains('hidden'))renderResume();
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')refreshCurrentView();});
window.addEventListener('pageshow',refreshCurrentView);
window.addEventListener('focus',refreshCurrentView);

// ---------- boot ----------
async function boot(){
  try{const j=await api('/api/sessions');history.replaceState({view:'list'},'');
    show('listView');renderCards(j.sessions||[]);
    if(refreshLoop)clearInterval(refreshLoop);
    refreshLoop=setInterval(()=>{if(!$('listView').classList.contains('hidden'))refresh();},4000);
  }catch(e){if(e.message==='unauth')show('login');}
}
boot();
</script>
